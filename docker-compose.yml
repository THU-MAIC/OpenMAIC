services:
  openmaic:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://openmaic:${POSTGRES_PASSWORD:-openmaic}@postgres:5432/openmaic
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Optional: mount server-providers.yml for provider config
      # - ./server-providers.yml:/app/server-providers.yml:ro
      - openmaic-data:/app/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openmaic
      POSTGRES_USER: openmaic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmaic}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmaic -d openmaic"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  openmaic-data:
  postgres-data:
