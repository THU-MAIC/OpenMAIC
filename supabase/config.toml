# Supabase Configuration for Slate
project_id = "Slate"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.courses]
public = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "application/pdf", "application/json"]

[storage.buckets.media]
public = true
file_size_limit = "50MiB"
allowed_mime_types = ["image/png", "image/jpeg", "video/mp4"]

[auth]
enabled = true
site_url = "https://thechalklabs.com"
additional_redirect_urls = ["https://thechalklabs.com"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false
