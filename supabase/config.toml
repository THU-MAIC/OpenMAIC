# Supabase Configuration for Slate
project_id = "Slate"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.courses]
public = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "application/pdf", "application/json"]

[storage.buckets.media]
public = true
file_size_limit = "50MiB"
allowed_mime_types = ["image/png", "image/jpeg", "video/mp4"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3000/auth/callback", "https://thechalklabs.com", "https://thechalklabs.com/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "937121058649-pcfq17gva8300flstebdgjevteu1u4k8.apps.googleusercontent.com"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET)"
skip_nonce_check = false


[remotes.production.auth]
site_url = "https://thechalklabs.com/"

[remotes.production]
project_id = "qnvzukpyvpcgoxwiiwia"