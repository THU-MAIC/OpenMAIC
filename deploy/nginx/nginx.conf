events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Trust Cloudflare IP ranges — restore real visitor IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    upstream keycloak {
        server keycloak:8080;
    }

    upstream oauth2proxy {
        server oauth2-proxy:4180;
    }

    server {
        listen 80;
        server_name my-learning.amtocbot.com;

        # Common proxy headers
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   https;
        proxy_set_header X-Forwarded-Host    $host;

        # ── Keycloak (identity provider) ──────────────────────────────────
        location /auth/ {
            proxy_pass http://keycloak;
            proxy_buffer_size        128k;
            proxy_buffers            4 256k;
            proxy_busy_buffers_size  256k;
            proxy_read_timeout       300s;
        }

        # ── oauth2-proxy sign-in / callback ───────────────────────────────
        location /oauth2/ {
            proxy_pass http://oauth2proxy;
            proxy_set_header X-Auth-Request-Redirect $scheme://$host$request_uri;
        }

        # ── Everything else: auth-gated OpenMAIC ─────────────────────────
        location / {
            proxy_pass          http://oauth2proxy;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }
    }
}
